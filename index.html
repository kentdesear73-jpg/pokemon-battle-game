<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pokémon Team Battle – 3 Attacks, 3 Opponents</title>
    <link rel="stylesheet" href="pokemon.css">
</head>
<body>
    <div class="game-container">
        <!-- TEAM SELECTION SCREEN -->
        <div id="teamSelection" class="selection-panel">
            <h1>CHOOSE YOUR 3 POKEMON</h1>
            <p class="subtitle">Pick a team of 3 to battle 3 enemies</p>
            <div id="teamGrid" class="team-grid"></div>
            <div class="selected-team">
                <h3>Your Team (click to remove)</h3>
                <div id="teamList" class="team-list"></div>
            </div>
            <button id="startBattleBtn" class="start-btn" disabled>START BATTLE (need 3)</button>
        </div>

        <!-- BATTLE ARENA -->
        <div id="battleArena" class="battle-arena" style="display: none;">
            <div class="battle-header">
                <div class="battle-stats">
                    <span>ENEMIES DEFEATED: <strong id="enemiesDefeated">0</strong> / 3</span>
                    <span>ACTIVE POKEMON: <strong id="activeName">-</strong></span>
                </div>
            </div>

            <div class="side-by-side">
                <!-- Player Active Card -->
                <div class="pokemon-card player-card">
                    <div class="card-avatar">
                        <img id="playerImg" class="battle-img" src="" alt="Player">
                        <div class="avatar-circle-fallback" id="playerFallback" style="display: none;"></div>
                    </div>
                    <div class="card-info">
                        <div class="pokemon-name" id="playerName">-</div>
                        <div class="hp-container">
                            <span class="hp-label">HP</span>
                            <div class="hp-bar"><div class="hp-fill" id="playerHpFill"></div></div>
                            <span class="hp-text" id="playerHpText">--/--</span>
                        </div>
                    </div>
                </div>

                <div class="vs-divider">VS</div>

                <!-- Opponent Card -->
                <div class="pokemon-card opponent-card">
                    <div class="card-avatar">
                        <img id="opponentImg" class="battle-img" src="" alt="Opponent">
                        <div class="avatar-circle-fallback" id="opponentFallback" style="display: none;"></div>
                    </div>
                    <div class="card-info">
                        <div class="pokemon-name" id="opponentName">-</div>
                        <div class="hp-container">
                            <span class="hp-label">HP</span>
                            <div class="hp-bar"><div class="hp-fill" id="opponentHpFill"></div></div>
                            <span class="hp-text" id="opponentHpText">--/--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Team Status (all 3 Pokémon) -->
            <div class="team-status" id="teamStatus"></div>

            <div class="action-buttons">
                <button id="attack1Btn" class="action-btn">ATTACK 1</button>
                <button id="attack2Btn" class="action-btn">ATTACK 2</button>
                <button id="attack3Btn" class="action-btn">ATTACK 3</button>
            </div>

            <div class="battle-log" id="battleLog">
                <div>Select your team to begin.</div>
            </div>

            <button id="resetGameBtn" class="reset-btn">RESTART GAME</button>
        </div>
    </div>

    <script src="pokemon.js"></script>
</body>
</html>
